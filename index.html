<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SUPER NOVUS — Novarys</title>
<link rel="icon" type="image/png" href="/appicon.png">
<link rel="apple-touch-icon" href="/appicon-180.png">
<meta name="theme-color" content="#030312">
<meta name="description" content="SUPER NOVUS — a Novarys cosmic arcade experience.">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SUPER NOVUS">
<meta property="og:title" content="SUPER NOVUS">
<meta property="og:description" content="Traverse la galaxie — Novarys cosmic arcade.">
<meta property="og:type" content="website">
<meta property="og:image" content="/appicon.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/appicon.png">
<style>
  :root{ --gold:#F5C542; --dim:#8b93b8; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#030312;
    font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,sans-serif;color:#fff;
    touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;inset:0}
  canvas{display:block}

  /* ===== HUD minimaliste ===== */
  #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:5}
  #topRow{position:fixed;top:calc(10px + env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:center;gap:34px;align-items:baseline}
  .stat{text-align:center}
  .stat .v{font-size:22px;font-weight:800;letter-spacing:.5px;font-variant-numeric:tabular-nums;
    text-shadow:0 0 16px rgba(245,197,66,.55), 0 1px 3px rgba(0,0,0,.8)}
  .stat .l{font-size:8px;letter-spacing:2.5px;color:var(--dim);font-weight:600;margin-top:1px}
  .stat.star .v{color:var(--gold)}
  .stat.star .v::before{content:"★ ";font-size:16px}
  #livesDots{position:fixed;top:calc(64px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    font-size:12px;letter-spacing:6px;color:var(--gold);text-shadow:0 0 8px rgba(245,197,66,.8)}
  #livesDots .lost{color:rgba(255,255,255,.14);text-shadow:none}

  /* ===== STAR ENERGY ===== */
  #energyWrap{position:fixed;top:calc(88px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    width:min(58vw,300px);text-align:center;pointer-events:none}
  #energyBar{width:100%;height:4px;border-radius:3px;background:rgba(245,197,66,.12);
    overflow:hidden;box-shadow:inset 0 0 6px rgba(0,0,0,.5)}
  #energyFill{height:100%;width:0%;border-radius:3px;
    background:linear-gradient(90deg,#D89B1E,var(--gold) 55%,#FFEDB0);
    box-shadow:0 0 10px rgba(245,197,66,.7);transition:width .18s ease-out}
  #energyHint{margin-top:5px;font-size:8.5px;letter-spacing:3px;color:var(--gold);font-weight:800;
    opacity:0;transition:opacity .3s;text-shadow:0 0 10px rgba(245,197,66,.85)}
  #energyWrap.full #energyFill{animation:energyPulse .5s ease-in-out infinite}
  #energyWrap.full #energyHint{opacity:1;animation:pulse 1.4s ease-in-out infinite}
  @keyframes energyPulse{0%,100%{opacity:1;box-shadow:0 0 10px rgba(245,197,66,.7)}
    50%{opacity:.5;box-shadow:0 0 22px rgba(245,197,66,1)}}
  @media (prefers-reduced-motion: reduce){#energyWrap.full #energyFill,#energyWrap.full #energyHint{animation:none}}
  #pauseBtn{position:fixed;top:calc(8px + env(safe-area-inset-top));right:12px;width:44px;height:44px;
    background:rgba(10,12,32,.45);border:1px solid rgba(255,255,255,.18);border-radius:12px;
    color:#fff;font-size:14px;display:none;align-items:center;justify-content:center;z-index:7;
    pointer-events:auto;font-family:inherit;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  #musicBtn{position:fixed;top:calc(8px + env(safe-area-inset-top));left:12px;width:40px;height:40px;
    background:rgba(10,12,32,.4);border:1px solid rgba(255,255,255,.16);border-radius:11px;
    color:#fff;font-size:15px;line-height:1;display:none;align-items:center;justify-content:center;z-index:11;
    pointer-events:auto;font-family:inherit;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  #musicBtn.off{opacity:.5}
  #levelToast{position:fixed;top:26%;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;
    letter-spacing:6px;color:#fff;text-shadow:0 0 20px rgba(140,180,255,.9);opacity:0;transition:opacity .5s;z-index:6;white-space:nowrap}

  /* ===== Écrans ===== */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(120% 82% at 50% -12%, rgba(104,80,200,.30), transparent 58%),
      radial-gradient(80% 55% at 84% 12%, rgba(56,120,224,.15), transparent 55%),
      radial-gradient(90% 60% at 50% 118%, rgba(120,66,200,.14), transparent 60%),
      linear-gradient(180deg,#070619 0%,#050416 55%,#030310 100%);
    z-index:10;text-align:center;padding:22px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  /* Single-screen menu: everything visible at once, no scroll, safe-area aware */
  #menu{justify-content:center;overflow:hidden;padding:22px;
    padding-top:calc(env(safe-area-inset-top) + 62px);
    padding-bottom:calc(env(safe-area-inset-bottom) + 14px)}
  #menu > *{flex-shrink:0}
  .brand{font-size:11px;letter-spacing:11px;text-indent:11px;color:#9aa6d4;margin-bottom:14px;font-weight:600;opacity:.9}
  h1{font-size:clamp(44px,12vw,84px);font-weight:800;letter-spacing:.1em;line-height:1.02;
    background:linear-gradient(180deg,#ffffff 2%,#d4e8ff 28%,#7db2ff 60%,#2f6fd6 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 22px rgba(96,158,255,.5)) drop-shadow(0 2px 0 rgba(8,14,40,.85));
    margin-bottom:6px}
  .sunline{position:relative;width:min(56vw,280px);height:2px;margin:16px 0 30px;
    background:linear-gradient(90deg,transparent,rgba(110,170,255,.5) 22%,#c6e2ff 50%,rgba(110,170,255,.5) 78%,transparent);
    box-shadow:0 0 14px rgba(110,170,255,.6)}
  .sunline::before{content:"";position:absolute;left:50%;top:50%;width:9px;height:9px;
    transform:translate(-50%,-50%) rotate(45deg);background:#eaf4ff;border-radius:1px;
    box-shadow:0 0 12px 2px rgba(150,200,255,.9)}
  .sub{font-size:10.5px;letter-spacing:6px;color:#8f9ac4;margin-bottom:18px;font-weight:600}
  .rules{font-size:12.5px;line-height:2;color:#c4cbe8;margin-bottom:30px;max-width:330px;opacity:.94}
  .rules b{color:#cbb6ff;font-weight:700}
  button.big{position:relative;pointer-events:auto;font-family:inherit;font-size:15px;letter-spacing:3.5px;
    text-transform:uppercase;padding:18px 46px;color:#3a2600;border:none;border-radius:16px;cursor:pointer;font-weight:800;
    background:linear-gradient(180deg,#FFF6D6 0%,#FBD974 40%,#F0B429 78%,#D48E12 100%);
    box-shadow:0 12px 28px rgba(240,180,40,.4), 0 2px 0 rgba(255,255,255,.55) inset, 0 -3px 9px rgba(150,90,0,.32) inset, 0 6px 0 #9c6a12;
    transition:transform .13s cubic-bezier(.2,.8,.2,1), box-shadow .13s;overflow:hidden}
  button.big::after{content:"";position:absolute;left:2px;right:2px;top:2px;height:46%;border-radius:14px 14px 42% 42%;
    background:linear-gradient(180deg,rgba(255,255,255,.6),transparent);pointer-events:none}
  button.big:hover{transform:translateY(-1px);box-shadow:0 16px 34px rgba(240,180,40,.48), 0 2px 0 rgba(255,255,255,.6) inset, 0 -3px 9px rgba(150,90,0,.32) inset, 0 7px 0 #9c6a12}
  button.big:active{transform:translateY(4px);box-shadow:0 5px 14px rgba(240,180,40,.4), 0 2px 0 rgba(255,255,255,.5) inset, 0 2px 0 #9c6a12}
  #gameover,#pauseScreen{display:none}
  #gameover h1{background:linear-gradient(180deg,#FFE3CE,#FF7A2F 55%,#8E3208);
    -webkit-background-clip:text;background-clip:text}
  .statLine{font-size:14px;color:#c8cfe8;margin:3px 0;font-variant-numeric:tabular-nums}
  .statLine b{color:#fff;font-size:18px;font-weight:800}
  .statLine.gold b{color:var(--gold)}
  #bestScore{font-size:11px;letter-spacing:3px;color:var(--dim);margin:10px 0 4px}
  #seedLine{font-size:9px;letter-spacing:2px;color:#4a5178;margin:0 0 12px;font-variant-numeric:tabular-nums}
  #newRecordBadge{display:none;font-size:12px;letter-spacing:4px;font-weight:800;color:#ffe9a0;
    text-shadow:0 0 16px rgba(245,197,66,.9);margin:6px 0 8px;animation:pulse 1.4s ease-in-out infinite}
  .rankLine{display:none;font-size:12px;letter-spacing:2px;color:#c8cfe8;margin:3px 0;font-variant-numeric:tabular-nums}
  .rankLine b{color:var(--gold);font-weight:800}
  button.big.bigbang{margin-top:8px;color:#fff;
    background:linear-gradient(180deg,#c3a0ff,#7a4fe0 55%,#472aa0);
    box-shadow:0 0 34px rgba(140,90,255,.6), 0 4px 0 rgba(50,20,110,.6);font-size:14px;letter-spacing:3px}
  button.big.bigbang:disabled{opacity:.5;filter:grayscale(.35);cursor:default}
  #bigBangCount{font-size:9.5px;letter-spacing:3px;color:#9a86c8;font-weight:700;margin-top:6px}
  #menuBtn{margin-top:14px}
  .pulse{animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @media (prefers-reduced-motion: reduce){.pulse{animation:none}}

  /* ===== Auth + Leaderboard ===== */
  #authBox{margin:2px 0 18px;display:flex;flex-direction:column;align-items:center;gap:11px}
  #authRow{display:flex;gap:8px;align-items:center}
  #pseudoInput{pointer-events:auto;touch-action:auto;font-family:inherit;font-size:13px;letter-spacing:2px;
    padding:11px 14px;width:170px;text-align:center;color:#fff;font-weight:700;
    background:rgba(10,14,36,.7);border:1px solid rgba(140,170,255,.35);border-radius:10px;outline:none;text-transform:uppercase}
  #pseudoInput::placeholder{color:#5a6288;font-weight:600}
  button.mini{position:relative;pointer-events:auto;font-family:inherit;font-size:12px;letter-spacing:1.5px;padding:13px 22px;
    color:#e7ecff;font-weight:700;border-radius:13px;cursor:pointer;
    background:linear-gradient(180deg,rgba(66,80,150,.55),rgba(30,40,92,.6));
    border:1px solid rgba(150,170,255,.34);
    box-shadow:0 8px 20px rgba(10,14,40,.5), 0 1px 0 rgba(255,255,255,.12) inset;
    -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);
    transition:transform .12s,border-color .2s,box-shadow .2s}
  button.mini:hover{border-color:rgba(176,158,255,.62);box-shadow:0 10px 24px rgba(44,32,96,.55), 0 1px 0 rgba(255,255,255,.16) inset}
  button.mini:active{transform:scale(.96)}
  #loggedRow{display:none;flex-direction:row;gap:10px;align-items:center}
  #loggedRow .who{font-size:12px;letter-spacing:2px;color:#bfe0a8;font-weight:700}
  .authNote{font-size:9.5px;letter-spacing:1px;color:#5a6288}
  #saveState{font-size:11px;letter-spacing:2px;margin:2px 0 10px;font-weight:700}
  #saveState.ok{color:#9fdc8a}
  #saveState.no{color:#8b93b8}

  .lbPanel{width:min(86vw,330px);margin:0;background:rgba(8,12,30,.55);
    border:1px solid rgba(140,170,255,.2);border-radius:16px;padding:11px 13px 9px;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .lbPanel h3{font-size:10px;letter-spacing:3px;color:var(--dim);font-weight:700;margin-bottom:8px}
  #lbListMenu{max-height:132px;overflow:hidden}
  .lbRow{display:flex;justify-content:space-between;align-items:baseline;padding:4px 2px;
    font-size:12.5px;font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(255,255,255,.05)}
  .lbRow:last-child{border-bottom:none}
  .lbRow .rank{color:var(--dim);width:20px;text-align:left;font-weight:700}
  .lbRow .lbAvatar{width:26px;height:26px;border-radius:50%;margin-right:8px;object-fit:cover;
    background:#0a0e24;border:1px solid rgba(245,197,66,.3);flex-shrink:0}
  .lbRow .name{flex:1;text-align:left;letter-spacing:1px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbRow .pts{color:var(--gold);font-weight:800;margin-left:10px}
  .lbRow.me{background:rgba(245,197,66,.1);border-radius:6px}
  .lbRow.me .name{color:var(--gold)}
  .lbRow .who{display:flex;flex-direction:column;flex:1;min-width:0;text-align:left}
  .lbRow .sub{font-size:9px;letter-spacing:.5px;color:#5a6288;font-weight:600;margin-top:1px}
  .lbRow.me .sub{color:#b99a4e}
  .lbEmpty{font-size:11px;color:#5a6288;letter-spacing:1px;padding:6px 0}
  .lbTabs{display:flex;gap:6px;margin:0 0 8px}
  .lbTab{flex:1;pointer-events:auto;font-family:inherit;font-size:10px;letter-spacing:2px;font-weight:700;
    padding:7px 0;color:var(--dim);background:rgba(30,40,80,.4);border:1px solid rgba(140,170,255,.18);
    border-radius:8px;cursor:pointer}
  .lbTab.active{color:#050418;background:linear-gradient(180deg,#FFEDB0,var(--gold) 60%,#D89B1E);border-color:transparent}
  .lbPrize{font-size:10px;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin:0 0 8px;text-align:center;line-height:1.55}
  .lbPrize span{color:#c8cfe8;font-weight:600}

  /* ===== Menu header — one toolbar, three controls, identical design ===== */
  #menuTop{position:fixed;top:0;left:0;right:0;height:calc(env(safe-area-inset-top) + 58px);
    display:flex;justify-content:flex-end;align-items:center;gap:8px;z-index:14;pointer-events:none;
    padding:env(safe-area-inset-top) 14px 0;
    background:linear-gradient(180deg,rgba(6,6,22,.7),rgba(6,6,22,.14) 70%,transparent)}
  #menuTop > *{pointer-events:auto}
  /* shared shell: same height, radius, border, glow, shadow, backdrop for all 3 */
  .hCtl{height:42px;border-radius:21px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(150,170,255,.28);background:rgba(14,18,44,.55);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    box-shadow:0 5px 16px rgba(8,10,30,.5), 0 0 14px rgba(120,150,255,.13), inset 0 1px 0 rgba(255,255,255,.08);
    transition:transform .12s,border-color .2s,box-shadow .2s}
  .hIcon{width:42px;font-size:17px;line-height:1;color:#eaf0ff;cursor:pointer;font-family:inherit;
    background-size:cover;background-position:center;background-repeat:no-repeat}
  .hIcon:active{transform:scale(.92)}
  .hIcon.off{opacity:.5}
  /* Default profile avatar = the official Super Novus icon until one is uploaded */
  #profileIcon{background-image:url("/appicon.png")}
  #profileIcon.hasAvatar{border-color:rgba(245,197,66,.6)}
  .langSel{gap:2px;padding:0 4px}
  .langBtn{pointer-events:auto;font-family:inherit;font-size:10px;font-weight:800;letter-spacing:.2px;
    color:#9aa6d4;background:none;border:none;border-radius:13px;padding:8px 6px;cursor:pointer;transition:color .2s,background .2s}
  .langBtn.active{color:#241a00;background:linear-gradient(180deg,#FFE9A8,#F0B429)}

  /* ===== Official logo + connected wallet status ===== */
  .logo{width:min(72vw,330px);height:auto;margin:0 0 8px;pointer-events:none;
    filter:drop-shadow(0 0 18px rgba(90,150,255,.4))}
  #walletStatus{display:none;align-items:center;gap:8px;pointer-events:auto;cursor:pointer;
    font-size:14px;font-weight:800;letter-spacing:.4px;color:#eef2ff}
  #walletStatus .wDot{width:9px;height:9px;border-radius:50%;background:#b98cff;
    box-shadow:0 0 10px rgba(170,120,255,.9);flex-shrink:0}

  /* ===== Boot splash (logo) ===== */
  #splash{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 42%,#0a0a22,#03030f 72%);transition:opacity .5s ease}
  #splash.hide{opacity:0;pointer-events:none}
  #splash img{width:min(70vw,320px);filter:drop-shadow(0 0 26px rgba(90,150,255,.45))}

  /* ===== Controls setting ===== */
  .setPanel{width:min(86vw,330px);margin:0 0 14px}
  .setTitle{font-size:10px;letter-spacing:3px;color:var(--dim);font-weight:700;margin-bottom:7px;text-align:center}
  .ctrlOpts{display:flex;gap:8px}
  .ctrlOpt{flex:1;pointer-events:auto;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.4px;
    color:#c8cfe8;background:rgba(20,26,58,.5);border:1px solid rgba(140,170,255,.2);border-radius:10px;
    padding:11px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .ctrlOpt .dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(140,170,255,.5);flex-shrink:0}
  .ctrlOpt.active{border-color:var(--gold);color:#fff}
  .ctrlOpt.active .dot{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px rgba(245,197,66,.7)}

  #whiteout{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9}
  #novaFlash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:9;
    background:radial-gradient(ellipse at 50% 50%, rgba(232,244,255,.96), rgba(120,180,255,.6) 52%, rgba(120,180,255,0) 100%)}
  #hitFlash{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(255,70,25,.5) 100%);
    opacity:0;pointer-events:none;z-index:8}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse at 50% 50%, transparent 62%, rgba(2,2,14,.6) 100%)}

  /* ===== Floating score pop-ups ===== */
  #floatLayer{position:fixed;inset:0;pointer-events:none;z-index:6;overflow:hidden}
  .floatScore{position:absolute;font-family:inherit;font-weight:800;letter-spacing:1px;white-space:nowrap;
    font-variant-numeric:tabular-nums;transform:translate(-50%,-50%);will-change:transform,opacity;
    text-shadow:0 0 12px currentColor, 0 2px 5px rgba(0,0,0,.65);animation:floatUp 1s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}
    16%{opacity:1;transform:translate(-50%,-64%) scale(1.08)}
    100%{opacity:0;transform:translate(-50%,-172%) scale(1)}}
  @media (prefers-reduced-motion: reduce){.floatScore{animation-duration:.5s}}
</style>
</head>
<body>

<div id="splash"><img src="/logo.png" alt="SUPER NOVUS"></div>

<div id="vignette"></div>

<div id="hud">
  <div id="topRow">
    <div class="stat"><div class="v" id="scoreV">0</div><div class="l" data-i18n="hud.score">SCORE</div></div>
    <div class="stat"><div class="v" id="distV">0</div><div class="l" data-i18n="hud.distance">DISTANCE</div></div>
    <div class="stat star"><div class="v" id="dustV">0</div><div class="l" data-i18n="hud.dust">POUSSIÈRE</div></div>
  </div>
  <div id="livesDots">●●●</div>
  <div id="energyWrap">
    <div id="energyBar"><div id="energyFill"></div></div>
    <div id="energyHint" data-i18n="hud.novaHint">DOUBLE-TAP — NOVA BLAST</div>
  </div>
  <div id="levelToast">VITESSE ++</div>
</div>
<button id="pauseBtn">❚❚</button>
<button id="musicBtn" aria-label="Musique">🎵</button>

<div id="whiteout"></div>
<div id="novaFlash"></div>
<div id="hitFlash"></div>
<div id="floatLayer"></div>

<div class="screen" id="menu">
  <div id="menuTop">
    <button id="menuMusicBtn" class="hCtl hIcon" aria-label="Musique">🎵</button>
    <button id="profileIcon" class="hCtl hIcon" data-i18n-aria="profile.open" aria-label="Profil"></button>
    <div class="hCtl langSel" id="langSel">
      <button class="langBtn" data-lang="fr">🇫🇷 FR</button>
      <button class="langBtn" data-lang="en">🇬🇧 EN</button>
      <button class="langBtn" data-lang="ko">🇰🇷 KR</button>
    </div>
  </div>

  <img id="logo" class="logo" src="/logo.png" alt="SUPER NOVUS">
  <div class="sub pulse" data-i18n="menu.tagline">TRAVERSE LA GALAXIE</div>

  <div id="authBox">
    <button class="big" id="playBtn" data-i18n="menu.playGuest">CONTINUER EN INVITÉ</button>
    <button class="mini" id="walletBtn" data-i18n="menu.connectWallet">🔗 CONNECTER LE WALLET</button>
    <div id="walletStatus"><span class="wDot"></span><span id="wNick"></span></div>
    <div class="authNote" id="walletState"></div>
  </div>

  <div class="setPanel">
    <div class="setTitle" data-i18n="controls.title">CONTRÔLES</div>
    <div class="ctrlOpts" id="ctrlOpts">
      <button class="ctrlOpt" data-mode="touch"><span class="dot"></span><span data-i18n="controls.touch">Toucher direct</span></button>
      <button class="ctrlOpt" data-mode="joystick"><span class="dot"></span><span data-i18n="controls.joystick">Joystick virtuel</span></button>
    </div>
  </div>

  <div class="lbPanel">
    <div class="lbTabs">
      <button class="lbTab active" data-period="weekly" data-i18n="menu.tabWeekly">SEMAINE</button>
      <button class="lbTab" data-period="monthly" data-i18n="menu.tabMonthly">MOIS</button>
    </div>
    <div class="lbPrize" id="lbPrize">🏆 <b>TOP 1 · ≈$25</b> <span>payé en CRO — compétition hebdo</span></div>
    <div id="lbListMenu"><div class="lbEmpty" data-i18n="common.loading">Chargement…</div></div>
  </div>
</div>

<div class="screen" id="pauseScreen">
  <div class="brand">N O V A R Y S</div>
  <h1 style="font-size:clamp(32px,8vw,60px)" data-i18n="pause.title">PAUSE</h1>
  <div class="sunline"></div>
  <button class="big" id="resumeBtn" data-i18n="pause.resume">REPRENDRE</button>
</div>

<div class="screen" id="gameover">
  <div class="brand">N O V A R Y S</div>
  <h1 data-i18n="gameover.title">EXTINCTION</h1>
  <div class="sunline"></div>
  <div id="newRecordBadge" data-i18n="gameover.newRecord">✦ NOUVEAU RECORD ✦</div>
  <div class="statLine"><span data-i18n="gameover.score">SCORE</span> <b id="finalScore">0</b></div>
  <div class="statLine"><span data-i18n="gameover.distance">DISTANCE</span> <b id="finalDist">0</b></div>
  <div class="statLine gold"><span data-i18n="gameover.dust">POUSSIÈRE</span> ★ <b id="finalDust">0</b></div>
  <div class="rankLine" id="weeklyRank"></div>
  <div class="rankLine" id="monthlyRank"></div>
  <div id="bestScore"></div>
  <div id="seedLine"></div>
  <div id="saveState" class="no"></div>
  <button class="big bigbang" id="bigBangBtn">🌌 BIG BANG #1 — 10 CRO</button>
  <div id="bigBangCount"></div>
  <button class="mini" id="menuBtn" data-i18n="gameover.menu">RETOUR AU MENU</button>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
