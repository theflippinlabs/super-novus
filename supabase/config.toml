# Supabase project config — read by the CLI and the GitHub integration on deploy.
# CRITICAL: these Edge Functions are called from the browser with the PUBLIC
# publishable key (sb_publishable_…), which is NOT a JWT. They MUST be deployed
# with JWT verification OFF, otherwise the API gateway rejects every call with
# 401 before the function runs (this was the cause of "Enregistrement impossible").
# Authenticity is enforced per-function: record-bigbang and record-payout verify
# the payment ON-CHAIN (Cronos RPC); submit-score relies on value bounds + a
# timestamp window + per-wallet rate limiting (no signature — the mobile
# WalletConnect sign prompt never surfaced, see that function's header). Gateway
# JWT verification is neither needed nor compatible here (public publishable key).

project_id = "xmjqrnlmcvrltjzuptao"

[functions.submit-score]
verify_jwt = false

[functions.record-bigbang]
verify_jwt = false

[functions.record-payout]
verify_jwt = false

[functions.grant-bigbang]
verify_jwt = false

[functions.admin-remove-score]
verify_jwt = false
